services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: slideleaf
      POSTGRES_PASSWORD: slideleaf
      POSTGRES_DB: slideleaf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://slideleaf:slideleaf@postgres:5432/slideleaf"
      REDIS_URL: "redis://redis:6379"
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "http://localhost:9000"
      API_URL: "http://localhost:4000"
      WEB_URL: "http://localhost:3000"
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://slideleaf:slideleaf@postgres:5432/slideleaf"
      REDIS_URL: "redis://redis:6379"
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "http://localhost:9000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
